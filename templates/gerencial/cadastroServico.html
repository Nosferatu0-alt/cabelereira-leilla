```html
{% extends 'base.html' %}

{% block content %}

<style>
    .card-servico{
        max-width: 600px;
        margin: 50px auto;
        border: none;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0,0,0,.08);
    }

    .card-header-custom{
        background: linear-gradient(135deg,#c0166e,#e91e8c);
        color: white;
        border-radius: 20px 20px 0 0 !important;
    }

    .btn-rosa{
        background: #e91e8c;
        color: white;
        border: none;
    }

    .btn-rosa:hover{
        background: #c0166e;
        color: white;
    }
</style>

<div class="container">

    <div class="card card-servico">

        <div class="card-header card-header-custom py-3">
            <h4 class="mb-0">
                <i class="bi bi-scissors me-2"></i>
                Cadastro de Serviço
            </h4>
        </div>

        <div class="card-body p-4">

            <form method="post">

                <div class="mb-3">
                    <label for="nome" class="form-label fw-semibold">
                        Nome do Serviço
                    </label>

                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        class="form-control"
                        placeholder="Ex.: Corte Feminino"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="descricao" class="form-label fw-semibold">
                        Descrição
                    </label>

                    <textarea
                        id="descricao"
                        name="descricao"
                        class="form-control"
                        rows="3"
                        placeholder="Descreva o serviço..."
                        required
                    ></textarea>
                </div>

                <div class="mb-4">
                    <label for="preco" class="form-label fw-semibold">
                        Preço
                    </label>

                    <div class="input-group">
                        <span class="input-group-text">
                            R$
                        </span>

                        <input
                            type="number"
                            step="0.01"
                            id="preco"
                            name="preco"
                            class="form-control"
                            placeholder="0,00"
                            required
                        >
                    </div>
                </div>

                <button
                    type="submit"
                    class="btn btn-rosa w-100 py-2"
                >
                    <i class="bi bi-check-circle me-2"></i>
                    Cadastrar Serviço
                </button>

            </form>

        </div>

    </div>

    <div class="text-center mt-4">

        <a
            href="{{ url_for('agendamentos') }}"
            class="btn btn-outline-primary me-2"
        >
            Criar Agendamento
        </a>

        <a
            href="{{ url_for('cadastroCliente') }}"
            class="btn btn-outline-secondary"
        >
            Criar Cliente
        </a>

    </div>

</div>

{% endblock %}
```
