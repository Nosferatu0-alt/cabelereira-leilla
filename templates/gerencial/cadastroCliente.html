```html
{% extends 'base.html' %}

{% block content %}

<style>
    .cadastro-card{
        max-width: 650px;
        margin: 50px auto;
        border: none;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0,0,0,.08);
    }

    .card-header-custom{
        background: linear-gradient(135deg,#c0166e,#e91e8c);
        color: white;
        border-radius: 20px 20px 0 0 !important;
    }

    .btn-rosa{
        background: #e91e8c;
        border: none;
        color: white;
    }

    .btn-rosa:hover{
        background: #c0166e;
        color: white;
    }
</style>

<div class="container">

    <div class="card cadastro-card">

        <div class="card-header card-header-custom py-3">
            <h4 class="mb-0">
                Cadastro de Cliente
            </h4>
        </div>

        <div class="card-body p-4">

            <form method="post">

                <div class="mb-3">
                    <label for="nome" class="form-label fw-semibold">
                        Nome
                    </label>

                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        class="form-control"
                        placeholder="Digite o nome completo"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-control"
                        placeholder="Digite o email"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="telefone" class="form-label fw-semibold">
                        Telefone
                    </label>

                    <input
                        type="text"
                        id="telefone"
                        name="telefone"
                        class="form-control"
                        placeholder="(00) 00000-0000"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label fw-semibold">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        class="form-control"
                        placeholder="Digite uma senha"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="btn btn-rosa w-100 py-2"
                >
                    Cadastrar Cliente
                </button>

            </form>

        </div>

    </div>

    <div class="text-center mt-4">

        <a
            href="{{ url_for('agendamentos') }}"
            class="btn btn-outline-primary me-2"
        >
            Criar Agendamento
        </a>

        <a
            href="{{ url_for('servicos') }}"
            class="btn btn-outline-secondary"
        >
            Cadastrar Serviço
        </a>

    </div>

</div>

{% endblock %}
```
